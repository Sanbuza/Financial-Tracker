<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">

    <header class="header">
      <h1>Finance Tracker</h1>
      <span class="month-label" id="monthLabel"></span>
    </header>

    <section class="summary-card">
      <p class="summary-label">Gastado este mes</p>
      <p class="summary-amount" id="totalSpent">—</p>
    </section>

    <section class="card">
      <h2 class="section-title">Por categoría</h2>
      <div id="categoryList"></div>
    </section>

    <section class="card">
      <h2 class="section-title">Nueva transacción</h2>
      <form id="txForm">
        <div class="field">
          <label for="date">Fecha</label>
          <input type="date" id="date" required />
        </div>
        <div class="field">
          <label for="amount">Monto (CAD)</label>
          <input type="number" id="amount" step="0.01" placeholder="-45.00" required />
          <span class="field-hint">Negativo = gasto · Positivo = ingreso</span>
        </div>
        <div class="field">
          <label for="merchant">Comercio</label>
          <input type="text" id="merchant" placeholder="No Frills" required />
        </div>
        <div class="field">
          <label for="category">Categoría</label>
          <select id="category" required>
            <option value="">Seleccionar...</option>
            <option>Groceries</option>
            <option>Entertainment</option>
            <option>Fixed &amp; Home</option>
            <option>Medical</option>
            <option>Pets</option>
            <option>Transportation</option>
            <option>Others</option>
          </select>
        </div>
        <div class="field">
          <label for="account">Cuenta</label>
          <input type="text" id="account" placeholder="CIBC Credit Card" />
        </div>
        <div class="field">
          <label for="owner">Dueño</label>
          <select id="owner" required>
            <option value="">Seleccionar...</option>
            <option>Santiago</option>
            <option>Carolina</option>
            <option>Joint</option>
          </select>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Guardar transacción</button>
        <p class="form-msg" id="formMsg"></p>
      </form>
    </section>

    <section class="card">
      <h2 class="section-title">Recientes</h2>
      <div id="txList"></div>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
